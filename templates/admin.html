<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Shree Madhav Furniture</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪑</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        :root {
            --sidebar-width: 250px;
        }
        body {
            background-color: var(--color-bg);
            display: flex;
            min-height: 100vh;
        }
        /* Sidebar Styling */
        .admin-sidebar {
            width: var(--sidebar-width);
            background-color: var(--color-bg-dark);
            color: white;
            position: fixed;
            height: 100vh;
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
        }
        .admin-brand {
            padding: 0 2rem 2rem;
            border-bottom: 1px solid rgba(212, 163, 115, 0.2);
            margin-bottom: 2rem;
            text-align: center;
        }
        .admin-brand img {
            width: 60px;
            height: 60px;
            margin: 0 auto 1rem;
            background: white;
            padding: 8px;
            border-radius: 50%;
            object-fit: contain;
        }
        .admin-brand h2 {
            font-family: var(--font-heading);
            color: var(--color-accent);
            font-size: 1.5rem;
        }
        .admin-nav {
            list-style: none;
            padding: 0;
            flex: 1;
        }
        .admin-nav li {
            margin-bottom: 0.5rem;
        }
        .admin-nav a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 1rem 2rem;
            display: block;
            transition: var(--transition);
            font-weight: 500;
        }
        .admin-nav a:hover, .admin-nav a.active {
            background-color: rgba(212, 163, 115, 0.1);
            color: var(--color-accent);
            border-left: 4px solid var(--color-accent);
        }
        .admin-nav-bottom {
            padding: 1rem 2rem;
            border-top: 1px solid rgba(212, 163, 115, 0.2);
        }
        .admin-nav-bottom a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.8;
            transition: var(--transition);
        }
        .admin-nav-bottom a:hover {
            opacity: 1;
            color: var(--color-accent);
        }
        
        /* Main Content */
        .admin-main {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 2rem 3rem;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(212, 163, 115, 0.1);
        }
        .admin-header h1 {
            font-family: var(--font-heading);
            color: var(--color-primary);
            font-size: 2rem;
        }
        
        /* Analytics Cards */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .analytics-card {
            background: white;
            padding: 2rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(212, 163, 115, 0.1);
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        .analytics-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background-color: var(--color-accent);
        }
        .analytics-card h3 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .analytics-card .value {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        /* CRUD Section */
        .admin-section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .admin-section-title h2 {
            font-family: var(--font-heading);
            color: var(--color-primary);
            font-size: 1.8rem;
        }
        
        .product-table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(212, 163, 115, 0.1);
            overflow: hidden;
        }
        .product-table {
            width: 100%;
            border-collapse: collapse;
        }
        .product-table th, .product-table td {
            padding: 1.2rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid rgba(212, 163, 115, 0.1);
        }
        .product-table th {
            background-color: rgba(245, 242, 235, 0.5);
            font-weight: 600;
            color: var(--color-primary);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .product-table img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .action-btns {
            display: flex;
            gap: 0.5rem;
        }
        .btn-edit {
            background-color: var(--color-bg);
            color: var(--color-primary);
            border: 1px solid var(--color-accent);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }
        .btn-edit:hover {
            background-color: var(--color-accent);
            color: white;
        }
        .btn-delete {
            background-color: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }
        .btn-delete:hover {
            background-color: #fca5a5;
            color: white;
            border-color: #fca5a5;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(59, 47, 47, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid var(--color-accent);
        }
        .modal h2 {
            font-family: var(--font-heading);
            color: var(--color-primary);
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            border-bottom: 2px solid var(--color-bg);
            padding-bottom: 0.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--color-primary);
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.1);
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }
        .btn-cancel {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-weight: 500;
            padding: 0.5rem 1rem;
        }
        
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .admin-sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 1rem 0;
            }
            .admin-main {
                margin-left: 0;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <aside class="admin-sidebar">
        <div class="admin-brand">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo">
            <h2>Shree Madhav</h2>
            <p style="font-size:0.8rem; opacity:0.8; font-family: var(--font-body);">Admin Portal</p>
        </div>
        <ul class="admin-nav">
            <li><a href="#" class="active">Overview & Products</a></li>
            <li><a href="{{ url_for('index') }}" target="_blank">View Live Site →</a></li>
        </ul>
        <div class="admin-nav-bottom">
            <a href="{{ url_for('logout') }}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Logout
            </a>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <h1>Dashboard Overview</h1>
            <div class="admin-profile" style="display:flex; align-items:center; gap:10px;">
                <div style="width:40px; height:40px; background:var(--color-accent); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-family:var(--font-heading); font-size: 1.2rem;">A</div>
                <span style="font-weight:600; color: var(--color-primary);">Admin</span>
            </div>
        </header>

        <div class="analytics-grid">
            <div class="analytics-card">
                <h3>Total Page Views</h3>
                <div class="value" style="font-size: 1rem; color: #999;">Loading...</div>
            </div>
            <div class="analytics-card">
                <h3>WhatsApp Inquiries</h3>
                <div class="value" style="font-size: 1rem; color: #999;">Loading...</div>
            </div>
            <div class="analytics-card">
                <h3>Total Products</h3>
                <div class="value" id="totalProductsCard" style="font-size: 1rem; color: #999;">Loading...</div>
            </div>
            <div class="analytics-card">
                <h3>Inquiry Rate</h3>
                <div class="value" style="font-size: 1rem; color: var(--color-accent);">Loading...</div>
            </div>
        </div>

        <div class="admin-section-title">
            <h2>Product Catalog</h2>
            <button class="btn btn-primary" onclick="openModal()" style="border-radius: 6px;">+ Add New Product</button>
        </div>

        <div class="product-table-container">
            <table class="product-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    <!-- Products rendered via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal">
            <h2 id="modalTitle">Add New Product</h2>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="productName" required placeholder="e.g. Premium Wardrobe">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="productCategory" required>
                        <option value="bed">Bed</option>
                        <option value="cupboard">Cupboard</option>
                        <option value="tv-unit">TV Unit</option>
                        <option value="bed cupboard">Bed & Cupboard Combo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="text" id="productPrice" required placeholder="e.g. ₹25,000">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="productImage" required placeholder="e.g. images/wardrobe.png">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="border-radius: 6px;">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='admin.js') }}"></script>
</body>
</html>
